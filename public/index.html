<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Library Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-header">
    <h1>Personal Library Tracker</h1>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">🌙 Dark Mode</button>
  </div>

  <!-- Add Book Form -->
  <form id="book-form">
    <h2>Add a Book</h2>
    <div class="form-group">
      <label for="title">Title *</label>
      <input type="text" id="title" name="title" required>
      <span id="title-error" class="error"></span>
    </div>
    <div class="form-group">
      <label for="author">Author</label>
      <input type="text" id="author" name="author">
    </div>
    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="want to read">Want to Read</option>
        <option value="reading">Reading</option>
        <option value="read">Read</option>
      </select>
    </div>
    <div class="form-group">
      <label for="category">Category</label>
      <input type="text" id="category" name="category">
    </div>
    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="3"></textarea>
    </div>
    <button type="submit">Add Book</button>
  </form>

  <!-- Summary Card -->
  <div class="summary-card">
    <h2>Collection Summary</h2>
    <div class="summary-stats">
      <div class="stat-item">
        <span class="stat-count" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-item">
        <span class="stat-count" id="stat-reading">0</span>
        <span class="stat-label">Reading</span>
      </div>
      <div class="stat-item">
        <span class="stat-count" id="stat-read">0</span>
        <span class="stat-label">Read</span>
      </div>
      <div class="stat-item">
        <span class="stat-count" id="stat-want-to-read">0</span>
        <span class="stat-label">Want to Read</span>
      </div>
    </div>
  </div>

  <!-- Search/Filter & Sort -->
  <div class="controls-container">
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search by title, author, or category...">
    </div>
    <div class="sort-container">
      <label for="sort-select">Sort by:</label>
      <select id="sort-select">
        <option value="date-desc">Date Added (Newest)</option>
        <option value="date-asc">Date Added (Oldest)</option>
        <option value="title-asc">Title (A-Z)</option>
        <option value="title-desc">Title (Z-A)</option>
      </select>
    </div>
  </div>

  <!-- Books Table -->
  <table id="books-table">
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Status</th>
        <th>Category</th>
        <th>Notes</th>
        <th>Added</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="books-body">
      <!-- Rows will be inserted here by app.js -->
    </tbody>
  </table>
  <p id="no-books-message" class="empty-message">No books in your collection yet</p>
  <p id="no-search-results-message" class="empty-message">No books match your search</p>

  <script src="app.js"></script>
</body>
</html>
